services:
  homeassistant-dev:
    image: ghcr.io/home-assistant/home-assistant:2026.2.3
    entrypoint: /bin/sh
    command: -c "while sleep 1000; do :; done"
    privileged: true
    environment:
      GIT_EDITOR: code --wait
      WORKSPACE_DIRECTORY: /workspaces/homeassistant-homewizard-instant
      HOMEWIZARD_INSTANT_ALLOW_INSECURE_V2: "1"
    ports:
      - "127.0.0.1:7123:8123"
    volumes:
      - ..:/workspaces/homeassistant-homewizard-instant:cached
      - ./ha_config:/config:cached
      - ../custom_components:/config/custom_components:cached
    depends_on:
      - dummy-p1
    networks:
      - hwisolated
      - hwegress

  dummy-p1:
    build:
      context: ..
      dockerfile: .devcontainer/dummy-p1.Dockerfile
    working_dir: /workspace
    command:
      - python
      - .devcontainer/dummy_p1_meter.py
      - --host
      - 0.0.0.0
      - --port
      - "15510"
      - --seed
      - "424242"
      - --timezone
      - Europe/Amsterdam
      - --latitude
      - "52.3676"
      - --pv-peak-w
      - "4200"
    expose:
      - "15510"
    volumes:
      - ..:/workspace:ro,cached
    networks:
      hwisolated:
        # Keep manual setup stable in Home Assistant across container restarts.
        ipv4_address: 172.31.250.10

networks:
  hwisolated:
    name: homewizard_instant_isolated
    driver: bridge
    internal: true
    ipam:
      driver: default
      config:
        - subnet: 172.31.250.0/24
  hwegress:
    name: homewizard_instant_egress
    driver: bridge
